<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ihor Shpykuliak — Dashboard &amp; Report Examples</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F6F3EC;
    --paper:#FBFAF6;
    --ink:#1B2430;
    --slate:#4A5568;
    --amber:#C97A2B;
    --amber-dark:#9C5C1C;
    --hair:#D8D2C4;
    --hair-dark:#C4BCA9;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--cream);color:var(--ink);
    font-family:'Inter',sans-serif;
    display:flex;
  }

  /* ---- Sidebar ---- */
  .sidebar{
    width:300px;flex-shrink:0;background:var(--paper);
    border-right:1px solid var(--hair);
    display:flex;flex-direction:column;height:100vh;position:sticky;top:0;
  }
  .sidebar-head{padding:26px 22px 18px;border-bottom:1px solid var(--hair);}
  .sidebar-head .glyph{
    font-family:'Fraunces',serif;font-weight:700;font-size:22px;
    background:var(--ink);color:var(--paper);
    width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;
    border-radius:3px;margin-bottom:12px;
  }
  .sidebar-head h1{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin:0 0 4px;}
  .sidebar-head .sub{font-size:12px;color:var(--slate);}

  .example-list{flex:1;overflow-y:auto;padding:12px 0;}
  .list-section-label{
    font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--slate);
    padding:14px 22px 6px;
  }
  .example-item{
    display:block;width:100%;text-align:left;background:none;border:none;cursor:pointer;
    padding:12px 22px;border-left:3px solid transparent;font-family:'Inter',sans-serif;
  }
  .example-item:hover{background:var(--cream);}
  .example-item.active{background:var(--cream);border-left-color:var(--amber);}
  .example-item .tag{
    font-family:'IBM Plex Mono',monospace;font-size:9.5px;text-transform:uppercase;
    color:var(--amber-dark);letter-spacing:0.05em;margin-bottom:3px;display:block;
  }
  .example-item .title{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:2px;}
  .example-item .desc{font-size:11.5px;color:var(--slate);line-height:1.4;}

  .example-item.placeholder{cursor:default;opacity:0.55;}
  .example-item.placeholder:hover{background:none;}
  .example-item.placeholder .title{font-style:italic;font-weight:500;}

  .sidebar-foot{padding:16px 22px;border-top:1px solid var(--hair);font-size:11px;color:var(--slate);}
  .sidebar-foot a{color:var(--amber-dark);text-decoration:none;}

  /* ---- Main area ---- */
  .main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0;}
  .main-header{
    padding:16px 26px;border-bottom:1px solid var(--hair);background:var(--paper);
    display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;
  }
  .main-header .info .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;
    color:var(--amber-dark);letter-spacing:0.05em;margin-bottom:3px;
  }
  .main-header .info h2{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin:0;}
  .main-header .info .desc{font-size:12.5px;color:var(--slate);margin-top:3px;}
  .open-btn{
    font-family:'Inter',sans-serif;font-size:12px;font-weight:600;
    background:var(--ink);color:var(--paper);padding:8px 16px;border-radius:5px;
    text-decoration:none;white-space:nowrap;
  }
  .open-btn:hover{background:var(--amber-dark);}

  .frame-wrap{flex:1;position:relative;background:#e9edf1;}
  iframe{width:100%;height:100%;border:none;display:block;background:#fff;}

  .empty-state{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;color:var(--slate);text-align:center;padding:40px;
  }
  .empty-state .glyph{font-size:38px;margin-bottom:10px;}
  .empty-state h3{font-family:'Fraunces',serif;font-weight:600;color:var(--ink);margin:0 0 6px;}
  .empty-state p{font-size:13px;max-width:340px;margin:0;}

  @media (max-width:820px){
    body{flex-direction:column;}
    .sidebar{width:100%;height:auto;position:relative;max-height:40vh;}
    .main{height:60vh;}
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-head">
    <div class="glyph">I</div>
    <h1>Dashboard Examples</h1>
    <div class="sub">Portfolio · synthetic data</div>
  </div>

  <div class="example-list" id="example-list"></div>

  <div class="sidebar-foot">
    <a href="https://ihorshpykuliak.github.io/">← back to portfolio</a>
  </div>
</div>

<div class="main">
  <div class="main-header">
    <div class="info">
      <div class="eyebrow" id="hdr-tag">—</div>
      <h2 id="hdr-title">Choose an example</h2>
      <div class="desc" id="hdr-desc"></div>
    </div>
    <a class="open-btn" id="open-new-tab" href="#" target="_blank" rel="noopener">Open in new tab ↗</a>
  </div>
  <div class="frame-wrap">
    <iframe id="viewer" title="Example preview"></iframe>
  </div>
</div>

<script>
// ---------------------------------------------------------------
// To add a new example in future — just add an object to the
// EXAMPLES array below. The page updates itself automatically.
// status: 'ready' -> clickable example linking to a file
// status: 'soon'  -> inactive placeholder entry ("coming soon")
// ---------------------------------------------------------------
const EXAMPLES = [
  {
    id: 'sales-dashboard',
    tag: 'ERP embeded dashboard',
    title: 'Interactive sales dashboard',
    desc: 'Prior Moths Sales Summary',
    file: 'examples/iQ-dashboard.html',
    status: 'ready'
  },
  {
    id: 'sales-report-email',
    tag: 'HTML email',
    title: 'Report as an HTML email',
    desc: 'Table-based markup for pasting into Outlook or a mailer.',
    file: 'examples/sales-report-email.html',
    status: 'ready'
  },
  {
    id: 'outlook-mockup',
    tag: 'Email mock-up',
    title: 'Report inside the Outlook interface',
    desc: 'The same report, shown as an opened email.',
    file: 'examples/outlook-mockup.html',
    status: 'ready'
  },
  {
    id: 'placeholder-1',
    tag: 'Coming soon',
    title: 'Next example',
    desc: 'A new case study will go here.',
    status: 'soon'
  }
];

const listEl = document.getElementById('example-list');
const iframe = document.getElementById('viewer');
const hdrTag = document.getElementById('hdr-tag');
const hdrTitle = document.getElementById('hdr-title');
const hdrDesc = document.getElementById('hdr-desc');
const openBtn = document.getElementById('open-new-tab');
const frameWrap = document.querySelector('.frame-wrap');

function renderList(){
  listEl.innerHTML = '<div class="list-section-label">Примеры</div>' +
    EXAMPLES.map(ex => {
      if(ex.status === 'soon'){
        return `<div class="example-item placeholder">
          <span class="tag">${ex.tag}</span>
          <div class="title">${ex.title}</div>
          <div class="desc">${ex.desc}</div>
        </div>`;
      }
      return `<button class="example-item" data-id="${ex.id}">
        <span class="tag">${ex.tag}</span>
        <div class="title">${ex.title}</div>
        <div class="desc">${ex.desc}</div>
      </button>`;
    }).join('');

  listEl.querySelectorAll('.example-item[data-id]').forEach(btn=>{
    btn.addEventListener('click', ()=> select(btn.dataset.id));
  });
}

function select(id){
  const ex = EXAMPLES.find(e=>e.id===id);
  if(!ex || ex.status!=='ready') return;

  listEl.querySelectorAll('.example-item').forEach(b=>b.classList.remove('active'));
  const btn = listEl.querySelector(`.example-item[data-id="${id}"]`);
  if(btn) btn.classList.add('active');

  hdrTag.textContent = ex.tag;
  hdrTitle.textContent = ex.title;
  hdrDesc.textContent = ex.desc;
  openBtn.href = ex.file;

  frameWrap.innerHTML = '';
  const f = document.createElement('iframe');
  f.id = 'viewer';
  f.title = ex.title;
  f.src = ex.file;
  frameWrap.appendChild(f);
}

renderList();
if(EXAMPLES.some(e=>e.status==='ready')){
  select(EXAMPLES.find(e=>e.status==='ready').id);
}
</script>

</body>
</html>
